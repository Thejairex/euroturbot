<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Automatización</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1>🤖 Monitor de Automatización</h1>
  <div class="status-bar">
    <span class="status-indicator" id="statusDot"></span>
    <span id="statusText">Inactivo</span>
  </div>
</header>

<main>
  <section class="controls">
    <button id="btnStart" class="btn btn-primary">▶ Iniciar todo</button>
    <button id="btnStartPipeline" class="btn btn-success">📁 Solo archivos</button>
    <button id="btnStop" class="btn btn-danger" disabled>⏹ Detener</button>
    <button id="btnRefresh" class="btn btn-secondary">🔄 Refrescar</button>
  </section>

  <section class="test-mode">
    <label class="test-toggle">
      <input type="checkbox" id="chkTest">
      <span>🧪 Modo prueba (1 registro)</span>
    </label>
    <div class="test-controls" id="testControls" style="display:none">
      <label>
        Hoja:
        <input type="text" id="inputSheet" value="SI TRANS" class="input-sm" placeholder="SI TRANS">
      </label>
      <label>
        Fila #:
        <input type="number" id="inputRow" min="0" class="input-sm" placeholder="0">
      </label>
    </div>
  </section>

  <section class="progress-section">
    <h2>Progreso</h2>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="progress-info">
      <span id="progressText">0%</span>
      <span id="elapsedText">⏱ 0s</span>
    </div>
  </section>

  <section class="summary">
    <div class="card ok">
      <span class="card-label">OK</span>
      <span class="card-value" id="countOk">0</span>
    </div>
    <div class="card failed">
      <span class="card-label">Fallos</span>
      <span class="card-value" id="countFailed">0</span>
    </div>
    <div class="card skipped">
      <span class="card-label">Saltados</span>
      <span class="card-value" id="countSkipped">0</span>
    </div>
    <div class="card total">
      <span class="card-label">Total</span>
      <span class="card-value" id="countTotal">0</span>
    </div>
  </section>

  <section class="files-section">
    <h2>Archivos</h2>
    <div class="files-info" id="filesInfo">
      <span class="badge" id="pendingBadge">📁 Pendientes: 0</span>
      <button id="btnResetAll" class="btn btn-small btn-danger">🗑 Resetear todo</button>
    </div>
    <table id="filesTable">
      <thead>
        <tr>
          <th>Archivo</th>
          <th>Estado</th>
          <th>Total</th>
          <th>OK</th>
          <th>Fallos</th>
          <th>Error</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="filesBody">
        <tr><td colspan="7" class="empty">Sin datos</td></tr>
      </tbody>
    </table>
  </section>

  <section class="steps">
    <h2>Pasos</h2>
    <table id="stepsTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Estado</th>
          <th>Duración</th>
          <th>Error</th>
        </tr>
      </thead>
      <tbody id="stepsBody"></tbody>
    </table>
  </section>

  <section class="logs">
    <h2>Logs</h2>
    <pre id="logOutput"><div class="log-empty">Esperando actividad...</div></pre>
  </section>
</main>

<script>
const $ = id => document.getElementById(id);

const statusDot = $('statusDot');
const statusText = $('statusText');
const progressFill = $('progressFill');
const progressText = $('progressText');
const elapsedText = $('elapsedText');
const stepsBody = $('stepsBody');
const filesBody = $('filesBody');
const pendingBadge = $('pendingBadge');
const logOutput = $('logOutput');
const btnStart = $('btnStart');
const btnPipeline = $('btnStartPipeline');
const btnStop = $('btnStop');
const btnRefresh = $('btnRefresh');
const chkTest = $('chkTest');
const testControls = $('testControls');
const inputSheet = $('inputSheet');
const inputRow = $('inputRow');

chkTest.addEventListener('change', function() {
  testControls.style.display = this.checked ? 'flex' : 'none';
});

function getTestQuery() {
  if (!chkTest.checked) return '';
  let q = '?test=true&sheet=' + encodeURIComponent(inputSheet.value || 'SI TRANS');
  const r = inputRow.value;
  if (r !== '') q += '&row=' + parseInt(r);
  return q;
}

function setRunning(running) {
  btnStart.disabled = running;
  btnPipeline.disabled = running;
  btnStop.disabled = !running;
  chkTest.disabled = running;
  inputSheet.disabled = running;
  inputRow.disabled = running;
}

function setStatus(running, error) {
  if (error) {
    statusDot.className = 'status-indicator error';
    statusText.textContent = 'Error';
  } else if (running) {
    statusDot.className = 'status-indicator running';
    statusText.textContent = 'Ejecutando...';
  } else {
    statusDot.className = 'status-indicator idle';
    statusText.textContent = 'Inactivo';
  }
}

function updateStats(data) {
  const pct = data.progress_pct || 0;
  progressFill.style.width = pct + '%';
  progressText.textContent = pct + '%';
  elapsedText.textContent = '⏱ ' + data.elapsed_seconds + 's';
  $('countOk').textContent = data.ok || 0;
  $('countFailed').textContent = data.failed || 0;
  $('countSkipped').textContent = data.skipped || 0;
  $('countTotal').textContent = data.total || 0;
  setStatus(data.running, data.error);
  if (data.finished) setRunning(false);

  stepsBody.innerHTML = '';
  if (data.steps && data.steps.length > 0) {
    data.steps.forEach((s, i) => {
      const tr = document.createElement('tr');
      let icon = '⏳';
      if (s.status === 'ok') icon = '✅';
      else if (s.status === 'failed') icon = '❌';
      else if (s.status === 'running') icon = '🔄';
      else if (s.status === 'skipped') icon = '⏭️';
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${s.name}</td>
        <td class="status-${s.status}">${icon} ${s.status}</td>
        <td>${s.duration || '-'}s</td>
        <td class="error-cell">${s.error || '-'}</td>
      `;
      stepsBody.appendChild(tr);
    });
  } else {
    stepsBody.innerHTML = '<tr><td colspan="5" class="empty">Sin pasos aún</td></tr>';
  }
}

function updateTracker(data) {
  pendingBadge.textContent = '📁 Pendientes: ' + (data.pending || 0);

  filesBody.innerHTML = '';
  if (data.files && data.files.length > 0) {
    data.files.forEach(f => {
      const tr = document.createElement('tr');
      let icon = '⏳';
      if (f.status === 'completed') icon = '✅';
      else if (f.status === 'failed') icon = '❌';
      else if (f.status === 'processing') icon = '🔄';
      tr.innerHTML = `
        <td title="${f.filename}">${f.filename}</td>
        <td class="status-${f.status}">${icon} ${f.status}</td>
        <td>${f.total_rows}</td>
        <td class="status-ok">${f.ok_rows || 0}</td>
        <td class="status-failed">${f.failed_rows || 0}</td>
        <td class="error-cell">${f.error || '-'}</td>
        <td><button class="btn btn-tiny btn-danger" onclick="resetFile('${f.filename}')">✕</button></td>
      `;
      filesBody.appendChild(tr);
    });
  } else {
    filesBody.innerHTML = '<tr><td colspan="7" class="empty">Sin archivos procesados aún</td></tr>';
  }
}

function resetFile(filename) {
  if (!confirm('¿Resetear ' + filename + '?')) return;
  fetch('/api/tracker/reset?file=' + encodeURIComponent(filename), { method: 'POST' })
    .then(r => r.json())
    .then(() => { fetchTracker(); })
    .catch(() => {});
}

function fetchLogs() {
  fetch('/api/logs?lines=50')
    .then(r => r.json())
    .then(data => {
      if (data.logs && data.logs.length > 0) {
        logOutput.innerHTML = data.logs.map(l => '<div>' + escapeHtml(l) + '</div>').join('');
        logOutput.scrollTop = logOutput.scrollHeight;
      }
    })
    .catch(() => {});
}

function fetchTracker() {
  fetch('/api/tracker')
    .then(r => r.json())
    .then(updateTracker)
    .catch(() => {});
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function connectSSE() {
  const evtSource = new EventSource('/api/stream');
  evtSource.onmessage = function(e) {
    const data = JSON.parse(e.data);
    updateStats(data);
    fetchLogs();
    fetchTracker();
  };
  evtSource.onerror = function() {
    evtSource.close();
    setTimeout(connectSSE, 2000);
  };
}

function startRequest(url, btn, text) {
  setRunning(true);
  btn.textContent = '⏳ Iniciando...';
  fetch(url + getTestQuery(), { method: 'POST' })
    .then(r => r.json())
    .then(data => {
      btn.textContent = text;
      if (data.status === 'ok') {
        connectSSE();
      } else {
        alert(data.message);
        setRunning(false);
      }
    })
    .catch(() => {
      btn.textContent = text;
      setRunning(false);
    });
}

btnStart.addEventListener('click', function() {
  startRequest('/api/start', this, '▶ Iniciar todo');
});

btnPipeline.addEventListener('click', function() {
  startRequest('/api/start/pipeline', this, '📁 Solo archivos');
});

btnStop.addEventListener('click', function() {
  this.disabled = true;
  this.textContent = '⏳ Deteniendo...';
  fetch('/api/stop', { method: 'POST' })
    .then(r => r.json())
    .then(() => {
      this.textContent = '⏹ Detener';
    })
    .catch(() => {
      this.disabled = false;
      this.textContent = '⏹ Detener';
    });
});

btnRefresh.addEventListener('click', function() {
  fetch('/api/stats')
    .then(r => r.json())
    .then(updateStats);
  fetchLogs();
  fetchTracker();
});

$('btnResetAll').addEventListener('click', function() {
  if (!confirm('¿Resetear TODO el tracker?')) return;
  fetch('/api/tracker/reset?all=true', { method: 'POST' })
    .then(r => r.json())
    .then(() => { fetchTracker(); })
    .catch(() => {});
});

fetchLogs();
fetchTracker();
</script>

</body>
</html>
